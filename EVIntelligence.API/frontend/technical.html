<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EV Infrastructure & Technical Analysis</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#020617;color:#e2e8f0;font-family:Segoe UI;margin:0}
.navbar{padding:18px 40px;border-bottom:1px solid #0ea5e9;display:flex;justify-content:space-between}
.title{font-size:26px;color:#22d3ee;font-weight:bold}
.container{padding:30px 40px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:25px}
.chart-card{border:1px solid #0ea5e9;border-radius:16px;padding:20px}
.chart-title{color:#22d3ee;font-size:18px;margin-bottom:15px}
canvas{height:350px!important}
</style>
</head>
<body>

<div class="navbar">
<div class="title">⚡ EV Infrastructure & Technical Analysis</div>
<div>
<a href="/">Overview</a>
<a href="/market.html">Analytics</a>
<a href="/technical.html">Infrastructure</a>
<a href="/ai.html">AI Insights</a> 
</div>
</div>

<div class="container">
<div class="charts-grid">

<div class="chart-card">
<div class="chart-title">🔌 Chargers by State (Column)</div>
<canvas id="chargerStateChart"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">💰 Price vs Range (Scatter)</div>
<canvas id="priceRangeInfra"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">🔋 Battery vs Range Radar</div>
<canvas id="batteryRadar"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">📈 Infrastructure Growth Area</div>
<canvas id="infraGrowth"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">⚡ Power vs Connectors (Bubble)</div>
<canvas id="bubbleChart"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">📊 Charger Level Distribution</div>
<canvas id="chargerLevelChart"></canvas>
</div>

</div>
</div>

<script src="/js/technical.js"></script>
</body>
</html>
