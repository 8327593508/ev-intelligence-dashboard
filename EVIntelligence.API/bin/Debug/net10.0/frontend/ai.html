<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moxie - EV Intelligence Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f172a 0%, #020617 40%, #000814 100%);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 20px 30px;
    font-size: 22px;
    font-weight: bold;
    color: #22d3ee;
    border-bottom: 1px solid rgba(34, 211, 238, 0.1);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(2, 6, 23, 0.8);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(34, 211, 238, 0.05);
}

/* CHAT WRAPPER */
.chat-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 15px;
}

/* CHAT BOX */
.chat-container {
    width: 70%;
    max-width: 950px;
    height: 72vh;
    overflow-y: auto;
    padding: 24px;
    border-radius: 24px;
    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(34, 211, 238, 0.08);
    box-shadow:
        0 0 40px rgba(34, 211, 238, 0.05),
        inset 0 0 20px rgba(34, 211, 238, 0.03);
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* MESSAGE BASE */
.message {
    max-width: 75%;
    padding: 15px 20px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 15px;
    animation: fadeIn 0.25s ease-in-out;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    border-radius: 20px 20px 6px 20px;
    box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
}

.bot {
    align-self: flex-start;
    background: rgba(2, 6, 23, 0.9);
    border: 1px solid rgba(34, 211, 238, 0.15);
    border-radius: 20px 20px 20px 6px;
    box-shadow: 0 0 15px rgba(34, 211, 238, 0.08);
}

/* BOT HEADER */
.bot-header {
    font-weight: bold;
    color: #22d3ee;
    margin-bottom: 6px;
}

/* CHART BOX */
.chart-box {
    margin-top: 10px;
    background: rgba(2, 6, 23, 0.85);
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(34, 211, 238, 0.12);
}

/* INPUT AREA */
.input-area {
    width: 70%;
    max-width: 950px;
    margin: 0 auto 35px auto;  /* 🔥 lifted upward */
    display: flex;
    background: rgba(15, 23, 42, 0.85);
    border-radius: 50px;
    border: 1px solid rgba(34, 211, 238, 0.2);
    padding: 10px;
    backdrop-filter: blur(20px);
    box-shadow:
        0 0 30px rgba(34, 211, 238, 0.1),
        inset 0 0 10px rgba(34, 211, 238, 0.05);
    transition: 0.3s ease;
}

.input-area:focus-within {
    box-shadow:
        0 0 40px rgba(34, 211, 238, 0.25),
        inset 0 0 12px rgba(34, 211, 238, 0.08);
}

/* INPUT FIELD */
#userInput {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    font-size: 16px;
    padding: 14px 18px;
}

/* BUTTON */
#sendBtn {
    border: none;
    border-radius: 40px;
    padding: 12px 26px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #22d3ee, #0ea5e9);
    color: black;
    transition: all 0.25s ease;
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
}

#sendBtn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 30px rgba(34, 211, 238, 0.7);
}

/* TYPING */
.typing {
    opacity: 0.7;
    font-style: italic;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
    🤖 Moxie - EV Intelligence Assistant
</div>

<div class="chat-wrapper">
    <div id="chatContainer" class="chat-container">
        <div class="message bot">
            <div class="bot-header">🤖 Moxie</div>
            Hello! I analyze EV registrations, trends, forecasts, charging infrastructure, and growth analytics from your database.
        </div>
    </div>
</div>

<div class="input-area">
    <input
        type="text"
        id="userInput"
        placeholder="Ask EV insights (e.g., EV growth 2020 to 2024, top states, trends...)"
    />
    <button id="sendBtn">Send</button>
</div>

<script src="/js/ai.js"></script>
</body>
</html>
